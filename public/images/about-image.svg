<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Background -->
  <defs>
    <linearGradient id="aboutGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="#1a1a1a"/>
  <rect width="400" height="500" fill="url(#aboutGradient)"/>
  
  <!-- Robotics workshop illustration -->
  <g transform="translate(200, 250)">
    <!-- Workbench -->
    <rect x="-100" y="80" width="200" height="30" fill="none" stroke="#00ffcc" stroke-width="2" opacity="0.7"/>
    
    <!-- Soldering iron -->
    <line x1="-40" y1="80" x2="-35" y2="20" stroke="#00ffcc" stroke-width="1.5"/>
    <circle cx="-35" cy="15" r="5" fill="#00ffcc" opacity="0.6"/>
    
    <!-- Arduino board -->
    <rect x="0" y="40" width="50" height="35" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <circle cx="10" cy="52" r="2" fill="#00ffcc"/>
    <circle cx="25" cy="52" r="2" fill="#00ffcc"/>
    <circle cx="40" cy="52" r="2" fill="#00ffcc"/>
    
    <!-- Circuit pattern -->
    <line x1="-80" y1="-30" x2="-30" y2="-30" stroke="#00ffcc" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="-30" x2="-30" y2="10" stroke="#00ffcc" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="10" x2="30" y2="10" stroke="#00ffcc" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="10" x2="30" y2="-30" stroke="#00ffcc" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="-30" x2="80" y2="-30" stroke="#00ffcc" stroke-width="1" opacity="0.4"/>
    
    <!-- Connection dots -->
    <circle cx="-80" cy="-30" r="3" fill="#00ffcc" opacity="0.6"/>
    <circle cx="80" cy="-30" r="3" fill="#00ffcc" opacity="0.6"/>
    
    <!-- Text -->
    <text x="0" y="140" text-anchor="middle" font-size="16" fill="#00ffcc" font-weight="bold">Engineering</text>
    <text x="0" y="160" text-anchor="middle" font-size="16" fill="#00ffcc" font-weight="bold">Robotics Lab</text>
  </g>
</svg>