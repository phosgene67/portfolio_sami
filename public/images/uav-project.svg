<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <defs>
    <linearGradient id="gradientUAV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9b0;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00ffcc;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#1a1a1a"/>
  <rect width="600" height="400" fill="url(#gradientUAV)"/>
  
  <!-- Quadcopter UAV illustration -->
  <g transform="translate(300, 200)">
    <!-- Central body -->
    <rect x="-25" y="-20" width="50" height="40" fill="none" stroke="#00ffcc" stroke-width="2" rx="5"/>
    <!-- Arms -->
    <line x1="-25" y1="0" x2="-80" y2="-40" stroke="#00ffcc" stroke-width="2"/>
    <line x1="25" y1="0" x2="80" y2="-40" stroke="#00ffcc" stroke-width="2"/>
    <line x1="-25" y1="0" x2="-80" y2="40" stroke="#00ffcc" stroke-width="2"/>
    <line x1="25" y1="0" x2="80" y2="40" stroke="#00ffcc" stroke-width="2"/>
    <!-- Propellers -->
    <circle cx="-80" cy="-40" r="20" fill="none" stroke="#00ffcc" stroke-width="1.5"/>
    <circle cx="80" cy="-40" r="20" fill="none" stroke="#00ffcc" stroke-width="1.5"/>
    <circle cx="-80" cy="40" r="20" fill="none" stroke="#00ffcc" stroke-width="1.5"/>
    <circle cx="80" cy="40" r="20" fill="none" stroke="#00ffcc" stroke-width="1.5"/>
    <!-- Camera -->
    <circle cx="0" cy="15" r="10" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <!-- Text -->
    <text x="0" y="100" text-anchor="middle" font-size="18" fill="#00ffcc" font-weight="bold">Autonomous UAV</text>
  </g>
</svg>