<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  
  <!-- Ground -->
  <rect y="240" width="400" height="60" fill="#0a0a0a" opacity="0.5"/>
  
  <!-- Obstacle blocks -->
  <rect x="30" y="180" width="50" height="60" fill="#ff4444" opacity="0.8" rx="4"/>
  <rect x="320" y="170" width="50" height="70" fill="#ff4444" opacity="0.8" rx="4"/>
  <rect x="170" y="200" width="60" height="40" fill="#ff4444" opacity="0.8" rx="4"/>
  
  <!-- Robot body (circular) -->
  <circle cx="200" cy="140" r="35" fill="#00ffcc" opacity="0.9"/>
  <circle cx="200" cy="140" r="33" fill="#00ffcc" opacity="0.7" stroke="#00ffcc" stroke-width="2"/>
  
  <!-- Motor wheels -->
  <circle cx="175" cy="165" r="12" fill="#333" stroke="#00ffcc" stroke-width="2"/>
  <circle cx="225" cy="165" r="12" fill="#333" stroke="#00ffcc" stroke-width="2"/>
  
  <!-- Wheel details -->
  <line x1="172" y1="165" x2="178" y2="165" stroke="#00ffcc" stroke-width="1"/>
  <line x1="175" y1="162" x2="175" y2="168" stroke="#00ffcc" stroke-width="1"/>
  <line x1="222" y1="165" x2="228" y2="165" stroke="#00ffcc" stroke-width="1"/>
  <line x1="225" y1="162" x2="225" y2="168" stroke="#00ffcc" stroke-width="1"/>
  
  <!-- Ultrasonic Sensor (front) -->
  <rect x="190" y="105" width="20" height="15" fill="#66ccff" opacity="0.8" rx="3"/>
  <circle cx="195" cy="112" r="2" fill="#00ffcc"/>
  <circle cx="205" cy="112" r="2" fill="#00ffcc"/>
  
  <!-- Sensor rays (detection) -->
  <line x1="200" y1="105" x2="200" y2="70" stroke="#66ccff" stroke-width="1.5" opacity="0.6" stroke-dasharray="3,3"/>
  <line x1="190" y1="105" x2="160" y2="75" stroke="#66ccff" stroke-width="1.5" opacity="0.6" stroke-dasharray="3,3"/>
  <line x1="210" y1="105" x2="240" y2="75" stroke="#66ccff" stroke-width="1.5" opacity="0.6" stroke-dasharray="3,3"/>
  
  <!-- Arduino board indicator (inside robot) -->
  <rect x="185" y="125" width="30" height="20" fill="#8844ff" opacity="0.7" rx="2"/>
  <text x="200" y="136" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">MCU</text>
  
  <!-- Battery indicator -->
  <rect x="200" y="155" width="8" height="12" fill="#ffaa00" opacity="0.8" rx="1"/>
  
  <!-- Movement direction arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00ffaa" />
    </marker>
  </defs>
  <path d="M 200 220 L 200 260" stroke="#00ffaa" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.7"/>
  
  <!-- Avoiding movement (curved path) -->
  <path d="M 100 140 Q 80 100 100 60" stroke="#00ffcc" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.5"/>
  <circle cx="100" cy="140" r="3" fill="#00ffcc" opacity="0.7"/>
  
  <!-- Status indicators (top right) -->
  <circle cx="360" cy="30" r="6" fill="#00ff00" opacity="0.8"/>
  <text x="340" y="35" font-size="10" fill="#00ff00" font-weight="bold">ACTIVE</text>
  
  <!-- Title -->
  <text x="200" y="290" font-size="14" fill="#00ffcc" text-anchor="middle" font-weight="bold">Object Avoiding Robot</text>
</svg>