<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <defs>
    <linearGradient id="gradientSensor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9b0;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00ffcc;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#1a1a1a"/>
  <rect width="600" height="400" fill="url(#gradientSensor)"/>
  
  <!-- IoT Sensor Network illustration -->
  <g transform="translate(300, 200)">
    <!-- Central Hub -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
    
    <!-- Connected Sensors -->
    <circle cx="-80" cy="-60" r="15" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <line x1="-20" y1="-20" x2="-65" y2="-45" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
    
    <circle cx="80" cy="-60" r="15" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <line x1="20" y1="-20" x2="65" y2="-45" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
    
    <circle cx="-80" cy="60" r="15" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <line x1="-20" y1="20" x2="-65" y2="45" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
    
    <circle cx="80" cy="60" r="15" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <line x1="20" y1="20" x2="65" y2="45" stroke="#00ffcc" stroke-width="1" opacity="0.5"/>
    
    <!-- Small indicators on hub -->
    <circle cx="0" cy="-10" r="3" fill="#00ffcc"/>
    <circle cx="8" cy="5" r="3" fill="#00ffcc"/>
    <circle cx="0" cy="10" r="3" fill="#00ffcc"/>
    
    <!-- Text -->
    <text x="0" y="120" text-anchor="middle" font-size="18" fill="#00ffcc" font-weight="bold">IoT Sensor Network</text>
  </g>
</svg>