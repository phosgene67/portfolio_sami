<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <defs>
    <linearGradient id="gradientAI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#1a1a1a"/>
  <rect width="600" height="400" fill="url(#gradientAI)"/>
  
  <!-- AI Neural Network illustration -->
  <g transform="translate(300, 200)">
    <!-- Nodes -->
    <circle cx="-60" cy="-40" r="8" fill="#00ffcc" opacity="0.8"/>
    <circle cx="-60" cy="0" r="8" fill="#00ffcc" opacity="0.8"/>
    <circle cx="-60" cy="40" r="8" fill="#00ffcc" opacity="0.8"/>
    
    <circle cx="0" cy="-60" r="8" fill="#00ffcc" opacity="0.9"/>
    <circle cx="0" cy="-20" r="8" fill="#00ffcc" opacity="0.9"/>
    <circle cx="0" cy="20" r="8" fill="#00ffcc" opacity="0.9"/>
    <circle cx="0" cy="60" r="8" fill="#00ffcc" opacity="0.9"/>
    
    <circle cx="60" cy="-40" r="8" fill="#00ffcc" opacity="0.8"/>
    <circle cx="60" cy="0" r="8" fill="#00ffcc" opacity="0.8"/>
    <circle cx="60" cy="40" r="8" fill="#00ffcc" opacity="0.8"/>
    
    <!-- Connections -->
    <line x1="-60" y1="-40" x2="0" y2="-60" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    <line x1="-60" y1="-40" x2="0" y2="-20" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    <line x1="-60" y1="0" x2="0" y2="-20" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    <line x1="-60" y1="0" x2="0" y2="20" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    <line x1="-60" y1="40" x2="0" y2="20" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    <line x1="-60" y1="40" x2="0" y2="60" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    
    <line x1="0" y1="-60" x2="60" y2="-40" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-20" x2="60" y2="0" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="20" x2="60" y2="40" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="60" x2="60" y2="40" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    
    <!-- Text -->
    <text x="0" y="100" text-anchor="middle" font-size="18" fill="#00ffcc" font-weight="bold">AI Automation</text>
  </g>
</svg>