<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <defs>
    <linearGradient id="gradientROV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00d9b0;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#1a1a1a"/>
  <rect width="600" height="400" fill="url(#gradientROV)"/>
  
  <!-- ROV Submarine illustration -->
  <g transform="translate(300, 200)">
    <!-- Hull -->
    <ellipse cx="0" cy="0" rx="80" ry="40" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <!-- Propellers -->
    <circle cx="-100" cy="-30" r="15" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <circle cx="-100" cy="30" r="15" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <circle cx="100" cy="-30" r="15" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <circle cx="100" cy="30" r="15" fill="none" stroke="#00ffcc" stroke-width="2"/>
    <!-- Camera -->
    <rect x="-20" y="-25" width="40" height="20" fill="none" stroke="#00ffcc" stroke-width="2" rx="3"/>
    <!-- Text -->
    <text x="0" y="80" text-anchor="middle" font-size="18" fill="#00ffcc" font-weight="bold">ROV Submarine</text>
  </g>
</svg>