<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <defs>
    <radialGradient id="heroGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0.05" />
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0f0f0f"/>
  <rect width="400" height="400" fill="url(#heroGradient)"/>
  
  <!-- Geometric design with robotics theme -->
  <g opacity="0.8">
    <!-- Central circuit pattern -->
    <circle cx="200" cy="200" r="50" fill="none" stroke="#00ffcc" stroke-width="1"/>
    <circle cx="200" cy="200" r="70" fill="none" stroke="#00ffcc" stroke-width="0.5" opacity="0.5"/>
    <circle cx="200" cy="200" r="90" fill="none" stroke="#00ffcc" stroke-width="0.5" opacity="0.3"/>
    
    <!-- Corner nodes -->
    <circle cx="80" cy="80" r="8" fill="#00ffcc" opacity="0.6"/>
    <circle cx="320" cy="80" r="8" fill="#00ffcc" opacity="0.6"/>
    <circle cx="80" cy="320" r="8" fill="#00ffcc" opacity="0.6"/>
    <circle cx="320" cy="320" r="8" fill="#00ffcc" opacity="0.6"/>
    
    <!-- Connection lines -->
    <line x1="130" y1="130" x2="270" y2="130" stroke="#00ffcc" stroke-width="0.5" opacity="0.4"/>
    <line x1="130" y1="270" x2="270" y2="270" stroke="#00ffcc" stroke-width="0.5" opacity="0.4"/>
    <line x1="130" y1="130" x2="130" y2="270" stroke="#00ffcc" stroke-width="0.5" opacity="0.4"/>
    <line x1="270" y1="130" x2="270" y2="270" stroke="#00ffcc" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Center element -->
    <rect x="170" y="170" width="60" height="60" fill="none" stroke="#00ffcc" stroke-width="2" rx="5"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="210" text-anchor="middle" font-size="24" fill="#00ffcc" font-weight="bold" font-family="monospace">SAMI</text>
</svg>